<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Data Operations backup dashboard</title>
  <desc id="desc">A light green operations dashboard showing protected data, backup jobs, recent runs, recovery posture, and audit activity.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#183428" flood-opacity=".08"/></filter>
    <style>
      .ink{fill:#14251e}.muted{fill:#69756f}.green{fill:#1f7a4e}.soft{fill:#e1f3e9}.surface{fill:#fff}.line{stroke:#dfe6e2}.h1{font:700 30px Inter,Arial,sans-serif}.h2{font:700 16px Inter,Arial,sans-serif}.h3{font:700 13px Inter,Arial,sans-serif}.body{font:500 10px Inter,Arial,sans-serif}.small{font:600 8px Inter,Arial,sans-serif;letter-spacing:.7px}.metric{font:700 24px Inter,Arial,sans-serif}.white{fill:#fff}
    </style>
  </defs>
  <rect width="1280" height="760" fill="#f4f7f5"/>
  <rect width="1280" height="60" fill="#fff"/><path d="M0 60h1280" class="line"/>
  <g transform="translate(48 15)">
    <rect width="30" height="30" rx="9" class="ink"/><rect x="7" y="16" width="4" height="8" rx="2" fill="#e9f26d"/><rect x="13" y="7" width="4" height="17" rx="2" fill="#e9f26d"/><rect x="19" y="12" width="4" height="12" rx="2" fill="#e9f26d"/>
    <text x="42" y="20" class="h2 ink">Data Operations</text>
  </g>
  <g transform="translate(993 18)"><rect width="100" height="25" rx="13" class="soft"/><circle cx="14" cy="12.5" r="4" class="green"/><text x="24" y="16" class="small green">SYSTEMS ONLINE</text><text x="118" y="16" class="body muted">admin@example.com</text></g>

  <g transform="translate(48 102)">
    <text y="0" class="small green">OPERATIONS OVERVIEW</text><text y="38" class="h1 ink">Backup control center</text><text y="60" class="body muted">Monitor scheduled data protection, transfer integrity, and recovery evidence.</text>
    <g transform="translate(950 -8)"><rect width="234" height="72" rx="12" class="ink" filter="url(#shadow)"/><text x="16" y="19" class="small" fill="#acb8b2">ENVIRONMENT</text><text x="16" y="40" class="h3 white">Local Docker cluster</text><text x="16" y="58" class="small" fill="#acb8b2">UTC · JUL 21, 2026 14:10</text></g>
  </g>

  <g transform="translate(48 186)">
    <g><rect width="279" height="108" rx="13" class="green" filter="url(#shadow)"/><text x="18" y="23" class="body" fill="#d9eee2">Protected data</text><text x="18" y="63" class="metric white">2.4 GB</text><text x="18" y="89" class="body" fill="#d9eee2">Across completed snapshots</text></g>
    <g transform="translate(296)"><rect width="279" height="108" rx="13" class="surface line" filter="url(#shadow)"/><text x="18" y="23" class="body muted">Successful runs</text><text x="18" y="63" class="metric ink">28</text><text x="18" y="89" class="body muted">96% completion rate</text></g>
    <g transform="translate(592)"><rect width="279" height="108" rx="13" class="surface line" filter="url(#shadow)"/><text x="18" y="23" class="body muted">Active operations</text><text x="18" y="63" class="metric ink">1</text><text x="18" y="89" class="body muted">Queued or processing</text></g>
    <g transform="translate(888)"><rect width="296" height="108" rx="13" class="surface line" filter="url(#shadow)"/><text x="18" y="23" class="body muted">Recovery points</text><text x="18" y="63" class="metric ink">7</text><text x="18" y="89" class="body muted">Retention enforced per job</text></g>
  </g>

  <g transform="translate(48 338)">
    <text y="0" class="small green">PROTECTION PLANS</text><text y="27" class="h2 ink">Backup jobs</text>
    <g transform="translate(0 45)" filter="url(#shadow)">
      <rect width="810" height="184" rx="14" class="surface line"/>
      <rect x="18" y="18" width="39" height="39" rx="11" class="soft"/><text x="31" y="44" font-size="18" class="green">↗</text>
      <text x="72" y="31" class="h2 ink">Operations data</text><text x="72" y="49" class="body muted">Incremental snapshot of reports and exported datasets</text>
      <g transform="translate(694 17)"><rect width="95" height="27" rx="14" class="soft"/><circle cx="15" cy="13.5" r="4" class="green"/><text x="26" y="17" class="small green">ENABLED</text></g>
      <g transform="translate(72 70)"><rect width="566" height="58" rx="9" fill="#f4f7f5"/><text x="14" y="18" class="small muted">SOURCE</text><text x="14" y="39" class="body ink">/data/source</text><text x="276" y="35" class="green">→</text><text x="326" y="18" class="small muted">SNAPSHOT STORE</text><text x="326" y="39" class="body ink">/data/backups</text></g>
      <g transform="translate(656 73)"><rect width="133" height="38" rx="9" class="green"/><text x="36" y="24" class="h3 white">Run now  →</text><rect y="47" width="133" height="35" rx="9" class="surface line"/><text x="26" y="69" class="body ink">Pause schedule</text></g>
      <text x="72" y="156" class="body muted">• Every 60 min        • 7 snapshots retained        • Last run: Jul 21 · 13:04</text>
    </g>
    <text y="260" class="small green">EXECUTION HISTORY</text><text y="287" class="h2 ink">Recent runs</text>
    <g transform="translate(0 303)"><rect width="810" height="93" rx="12" class="surface line"/><rect width="810" height="30" rx="12" fill="#f8faf9"/><text x="15" y="19" class="small muted">RUN</text><text x="130" y="19" class="small muted">JOB</text><text x="315" y="19" class="small muted">STATUS</text><text x="450" y="19" class="small muted">STARTED</text><text x="630" y="19" class="small muted">FILES</text><text x="720" y="19" class="small muted">SIZE</text><text x="15" y="60" class="h3 ink">acde1234</text><text x="130" y="60" class="body ink">Operations data</text><circle cx="323" cy="56" r="4" class="green"/><text x="335" y="60" class="h3 green">Succeeded</text><text x="450" y="60" class="body ink">Jul 21 · 13:04</text><text x="630" y="60" class="body ink">1,284</text><text x="720" y="60" class="body ink">84.2 MB</text></g>
  </g>

  <g transform="translate(886 338)">
    <rect width="346" height="255" rx="14" class="surface line" filter="url(#shadow)"/><text x="20" y="25" class="small green">READINESS</text><text x="20" y="50" class="h2 ink">Recovery posture</text><rect x="291" y="17" width="35" height="35" rx="9" fill="#e9f26d"/><text x="303" y="41" class="h2 ink">A</text>
    <circle cx="95" cy="124" r="52" fill="none" stroke="#e1f3e9" stroke-width="10"/><circle cx="95" cy="124" r="52" fill="none" stroke="#1f7a4e" stroke-width="10" stroke-dasharray="306 327" transform="rotate(-90 95 124)"/><text x="69" y="123" class="metric ink">96%</text><text x="65" y="141" class="body muted">run reliability</text>
    <g transform="translate(177 78)"><circle cx="7" cy="6" r="7" class="soft"/><text x="3" y="10" class="green">✓</text><text x="22" y="9" class="h3 ink">Incremental snapshots</text><text x="22" y="25" class="body muted">Hard-link strategy configured</text><circle cx="7" cy="55" r="7" class="soft"/><text x="3" y="59" class="green">✓</text><text x="22" y="58" class="h3 ink">Integrity evidence</text><text x="22" y="74" class="body muted">SHA-256 manifest per run</text><circle cx="7" cy="104" r="7" class="soft"/><text x="3" y="108" class="green">✓</text><text x="22" y="107" class="h3 ink">Retention control</text><text x="22" y="123" class="body muted">Old recovery points rotated</text></g>
    <path d="M20 217h306" class="line"/><text x="20" y="239" class="h3 green">Recovery runbook included</text><text x="310" y="239" class="green">✓</text>
  </g>
  <text x="48" y="748" class="body muted">DATA OPERATIONS &amp; BACKUP PLATFORM</text><text x="1032" y="748" class="body muted">DOCKER · POSTGRESQL · RSYNC</text>
</svg>
